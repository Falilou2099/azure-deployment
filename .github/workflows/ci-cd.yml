name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Tests unitaires
  # ─────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2 — Tests E2E Cypress
  # ─────────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Start app in background
        run: node app.js &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000/health --timeout 30000

      - name: Run Cypress E2E tests
        run: npx cypress run

  # ─────────────────────────────────────────
  # JOB 3 — Build & Push Docker Hub
  # ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]  # ← uniquement si job1 ET job2 OK
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/todos-app:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/todos-app:latest

  # ─────────────────────────────────────────
  # JOB 4 — Deploy sur VM Azure
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]  # ← uniquement si job3 OK
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_PASSWORD }}
          script: |
            # Idempotence — stop/rm si existe déjà
            docker stop todos-app || true
            docker rm todos-app || true

            # Récupère la dernière image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/todos-app:latest

            # Redémarre proprement
            docker run -d \
              --name todos-app \
              --restart always \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/todos-app:latest

            # Healthcheck — échoue si l'app ne répond pas
            sleep 5
            curl -f http://localhost:3000/health || exit 1
